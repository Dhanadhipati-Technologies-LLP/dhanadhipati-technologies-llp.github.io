<!DOCTYPE html>
<html>
<head>
  <title>Ludo Wordo — Join via Referral</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<script>
  var code = new URLSearchParams(window.location.search).get("code") || "";
  var isAndroid = /android/i.test(navigator.userAgent);
  var playStoreUrl = "https://play.google.com/store/apps/details" +
    "?id=com.dhanadhipatitechnologiesllp.ludowordo" +
    "&referrer=code%3D" + encodeURIComponent(code);
  var appStoreUrl = "https://apps.apple.com/app/ludo-wordo/idYOUR_IOS_ID";

  // Store code in cookie for manual entry fallback
  if (code) {
    document.cookie = "referral_code=" + code + "; max-age=86400; path=/";
  }

  // Redirect based on device
  if (isAndroid) {
    window.location.href = playStoreUrl;
  } else {
    window.location.href = appStoreUrl; // update when iOS is live
  }
</script>
<p>Redirecting you to Ludo Wordo... If not redirected, 
<a href="https://play.google.com/store/apps/details
?id=com.dhanadhipatitechnologiesllp.ludowordo">click here</a>.</p>
</body>
</html>
